version: '3.8'
services:
  db:
    image: postgres:16
    container_name: tempus-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tempus_db
    ports:
      - "5432:5432"
    volumes:
      - tempus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: tempus-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - tempus_qdrant_data:/qdrant/storage

volumes:
  tempus_pgdata:
  tempus_qdrant_data:
