name: Publish to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish jsonlogic-fast to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish crate
        run: cargo publish --package jsonlogic-fast --token ${{ secrets.CRATES_IO_TOKEN }}
