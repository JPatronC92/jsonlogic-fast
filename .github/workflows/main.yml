name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: lex_mx_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334

    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_SERVER: localhost
      POSTGRES_DB: lex_mx_db
      LLM_API_KEY: testing_key
      EMBEDDING_MODEL: text-embedding-3-small
      QDRANT_HOST: localhost
      QDRANT_PORT: 6333
      SECRET_KEY: test_secret
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Install btree_gist extension
        run: |
          PGPASSWORD=password psql -h localhost -U postgres -d lex_mx_db -c "CREATE EXTENSION IF NOT EXISTS btree_gist;"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run Tests
        run: uv run pytest -v
